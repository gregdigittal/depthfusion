name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pip-audit:
    name: "Python dependency audit (pip-audit)"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project (for dependency graph)
        run: pip install -e ".[dev]" --quiet || pip install -e "." --quiet

      - name: Audit Python dependencies
        # Audit the installed environment. Exits non-zero on any CVE found.
        # PYSEC-2026-311: chromadb >=1.0 — no fix version published as of 2026-07-18;
        # suppressed until upstream releases a patch. Track: https://pypi.org/project/chromadb/
        run: pip-audit --ignore-vuln PYSEC-2026-311

  npm-audit:
    name: "Node.js dependency audit (npm audit)"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 9

      - name: Install dependencies (frozen)
        run: pnpm --dir app install --frozen-lockfile

      - name: Audit Node.js dependencies
        # --audit-level high: only fail on high or critical severity findings.
        run: pnpm --dir app audit --audit-level high

  secret-scan:
    name: "Secret scanning (gitleaks)"
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout (full history for PR diff scan)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for private repos with gitleaks-action v2.
          # For public repos or self-hosted runners, this can be omitted.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
