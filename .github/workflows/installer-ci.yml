name: Installer CI

on:
  push:
    branches:
      - main
      - "feat/e44-*"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-matrix:
    name: "Test (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Disable Windows Defender real-time scanning (speed)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
          Add-MpPreference -ExclusionPath "$env:RUNNER_TOOL_CACHE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: pip install -e '.[local,dev]'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -e .[local,dev]

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: python -m pytest tests/ -x -q --ignore=tests/test_benchmark --ignore=tests/test_benchmarks --ignore=tests/test_integration
        continue-on-error: false

      - name: Run tests (Windows — fast allowlist)
        if: runner.os == 'Windows'
        # Allowlist of dirs confirmed subprocess-free and threading-light.
        # Windows process spawn is 5-15s vs 50ms on Linux; dirs with real
        # subprocess.run or multiprocessing (test_install, test_router,
        # test_recursive, test_metrics, test_capture, etc.) are covered by
        # Ubuntu which runs the full suite as the authoritative reference.
        run: >-
          python -m pytest
          tests/test_core
          tests/test_session
          tests/test_hooks
          tests/test_storage
          tests/test_cognitive
          tests/test_regression
          -x -q
        continue-on-error: false

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

      - name: Type check
        run: |
          pip install mypy
          mypy src/depthfusion/core/ src/depthfusion/recursive/ src/depthfusion/mcp/ --ignore-missing-imports
