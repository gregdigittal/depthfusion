name: Installer CI

on:
  push:
    branches:
      - main
      - "feat/e44-*"
  pull_request:

jobs:
  test-matrix:
    name: "Test (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    timeout-minutes: 45
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Disable Windows Defender real-time scanning (speed)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
          Add-MpPreference -ExclusionPath "$env:RUNNER_TOOL_CACHE"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: pip install -e '.[local,dev]'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -e .[local,dev]

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: python -m pytest tests/ -x -q --ignore=tests/test_benchmark --ignore=tests/test_benchmarks --ignore=tests/test_integration
        continue-on-error: false

      - name: Run tests (Windows — platform subset)
        if: runner.os == 'Windows'
        # Windows runners are ~15x slower than Linux; run a focused subset covering
        # platform-specific behaviour. Ubuntu runs the full suite as authoritative.
        run: python -m pytest tests/ -x -q --ignore=tests/test_benchmark --ignore=tests/test_benchmarks --ignore=tests/test_integration --ignore=tests/test_retrieval --ignore=tests/test_backends --ignore=tests/test_fusion --ignore=tests/test_graph --ignore=tests/test_scripts --ignore=tests/test_analyzer
        continue-on-error: false

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

      - name: Type check
        run: |
          pip install mypy
          mypy src/depthfusion/core/ src/depthfusion/recursive/ src/depthfusion/mcp/ --ignore-missing-imports
