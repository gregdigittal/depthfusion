name: Installer CI

on:
  push:
    branches:
      - main
      - "feat/e44-*"
  pull_request:

jobs:
  test-matrix:
    name: "Test (${{ matrix.os }}, Python ${{ matrix.python-version }})"
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Enable git long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: pip install -e '.[local,dev]'

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -e .[local,dev]

      - name: Run tests
        run: python -m pytest tests/ -x -q --ignore=tests/test_benchmark --ignore=tests/test_benchmarks --ignore=tests/test_integration
        continue-on-error: false

      - name: Lint
        run: |
          pip install ruff
          ruff check src/

      - name: Type check
        run: |
          pip install mypy
          mypy src/depthfusion/core/ src/depthfusion/recursive/ src/depthfusion/mcp/ --ignore-missing-imports
