name: Nightly Integration

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-integration:
    name: Integration tests (Python 3.12)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        # Override pyproject.toml addopts (-k filter excludes 'integration') so all
        # tests in this directory are collected and run.
        run: pytest tests/integration/ -v --timeout=120 --override-ini="addopts=-v --tb=short --timeout=120"
