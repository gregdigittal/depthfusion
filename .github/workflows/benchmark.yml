name: Benchmark

on:
  # Weekly schedule: Sunday 02:00 UTC
  schedule:
    - cron: "0 2 * * 0"
  # Allow manual triggers for ad-hoc regression checks
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark:
    name: "BM25 Performance — regression gate (20%)"
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run BM25 SLO tests
        run: |
          python -m pytest tests/test_performance.py -v --tb=short

      - name: Run benchmark and write results
        run: |
          python scripts/run_benchmark.py --output benchmark-results.json

      - name: Check regression against baseline
        run: |
          python scripts/check_benchmark_regression.py \
            --results benchmark-results.json \
            --baseline tests/benchmarks/baseline.json \
            --threshold 0.20

      - name: Upload benchmark results as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results.json
          retention-days: 90
