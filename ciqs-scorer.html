<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIQS Scoring — DepthFusion post-fix 2026-05-16</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--panel:#1a1a22;--border:#2e2e3a;
  --accent:#6c63ff;--accent2:#00d4aa;
  --text:#e0e0e8;--muted:#7878a0;
  --ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;
}
body{background:var(--bg);color:var(--text);font:14px/1.5 'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:600;color:#fff;white-space:nowrap}
.hdr .sub{color:var(--muted);font-size:12px;white-space:nowrap}
.pbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
.plbl{font-size:12px;color:var(--muted);white-space:nowrap}

/* Run tabs */
.rtabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border);padding:0 20px;gap:4px;flex-shrink:0}
.rtab{padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.rtab:hover{color:var(--text)}
.rtab.active{color:#fff;border-bottom-color:var(--accent)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:10px;font-weight:700;margin-left:6px}
.badge.c{background:var(--ok);color:#000}
.badge.p{background:var(--warn);color:#000}
.badge.e{background:var(--border);color:var(--muted)}

/* Main */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sb{width:210px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sb-sec{padding:8px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.sb-item{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .12s;position:relative}
.sb-item:hover{background:rgba(108,99,255,.07);color:var(--text)}
.sb-item.active{background:rgba(108,99,255,.14);color:#fff}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.sb-id{font-weight:700;font-size:11px;min-width:22px}
.sb-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--ok)}
.dot-par{background:var(--warn)}
.dot-em{background:var(--border)}

/* Content */
.cnt{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-hdr{padding:11px 16px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-ttl{font-weight:600;font-size:14px;flex:1}
.ctag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700}
.catB{background:rgba(239,68,68,.15);color:#fca5a5}
.catC{background:rgba(245,158,11,.15);color:#fcd34d}
.catD{background:rgba(34,197,94,.15);color:#86efac}
.catE{background:rgba(108,99,255,.15);color:#a5b4fc}
.card-body{padding:16px;display:flex;flex-direction:column;gap:14px}

/* Alert */
.alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:6px;padding:9px 13px;font-size:12px;color:#fcd34d;line-height:1.6}
.alert strong{color:#fbbf24}

/* Prompt */
.lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.pbox{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:11px 12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12.5px;line-height:1.6;color:#c8d0e0;position:relative}
.cpbtn{position:absolute;top:8px;right:8px;padding:3px 9px;background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer;opacity:.9}
.cpbtn:hover{opacity:1}
.cpbtn.ok{background:var(--ok)}

/* Response */
.rlbl{font-size:12px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.rlbl span{background:var(--accent);color:#fff;padding:1px 6px;border-radius:3px;font-size:10px}
textarea.resp{width:100%;min-height:90px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:6px;padding:9px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;transition:border-color .15s}
textarea.resp:focus{outline:none;border-color:var(--accent)}

/* Rubric */
.rub-grid{display:flex;flex-direction:column;gap:12px}
.rub-item{display:flex;flex-direction:column;gap:4px}
.rub-row{display:flex;align-items:center;gap:10px}
.rub-name{font-weight:600;font-size:13px;text-transform:capitalize;min-width:170px;cursor:help;border-bottom:1px dashed var(--border)}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border);cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s}
.slider::-webkit-slider-thumb:hover{transform:scale(1.25)}
.slider::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.sval{font-size:20px;font-weight:700;min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
.hints{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:0 1px}

/* Notes */
textarea.nt{width:100%;min-height:48px;background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical}
textarea.nt:focus{outline:none;border-color:var(--accent)}

/* Cat summary */
.catscore{background:rgba(108,99,255,.07);border:1px solid rgba(108,99,255,.18);border-radius:6px;padding:9px 13px;font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.catscore .cv{font-weight:700;font-size:17px;color:var(--accent2)}

/* Footer */
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.fsums{display:flex;gap:14px;flex:1;flex-wrap:wrap}
.schip{display:flex;align-items:center;gap:5px;font-size:12px}
.schip .sl{color:var(--muted)}
.schip .sv{font-weight:700}
.nbtn{padding:6px 11px;background:var(--border);border:none;border-radius:4px;color:var(--text);cursor:pointer;font-size:12px}
.nbtn:hover{background:rgba(108,99,255,.3)}
.nbtn:disabled{opacity:.3;cursor:default}
.expbtn{padding:7px 16px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.expbtn:hover{opacity:.85}
.expall{padding:7px 16px;background:var(--accent2);border:none;border-radius:6px;color:#000;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.expall:hover{opacity:.85}

/* Tooltip */
[title]{cursor:help}
</style>
</head>

    <div class="alert">${INSTR[p.cat]}</div>
    <div class="card">
      <div class="card-hdr">
        <span class="ctag cat${p.cat}">${p.cat}</span>
        <span class="card-ttl">${t} — ${p.ttl}</span>
        <span style="font-size:11px;color:var(--muted)">Run ${r}</span>
      </div>
      <div class="card-body">
        <div>
          <div class="lbl">Prompt — paste into fresh Claude Code session</div>
          <div class="pbox">
            <button class="cpbtn" id="cpbtn" onclick="cpPrompt()">Copy</button>
            <pre style="white-space:pre-wrap;font-family:inherit">${promptText}</pre>
          </div>
        </div>
        <div>
          <div class="rlbl">Claude response <span>optional — paste for reference</span></div>
          <textarea class="resp" placeholder="Paste Claude's response here (optional, for reference while scoring)…"
            oninput="saveR(${r},'${t}',this.value)">${savedR}</textarea>
        </div>
        <div>
          <div class="lbl">Rubric scores (0–10)</div>
          <div class="rub-grid">${rubs}</div>
        </div>
        <div>
          <div class="lbl">Notes</div>
          <textarea class="nt" placeholder="Any observations about this response…"
            oninput="saveN(${r},'${t}',this.value)">${savedN}</textarea>
        </div>
        <div class="catscore">
          <span style="color:var(--muted)">Topic:</span>
          <span class="cv">${sum}/${maxS}</span>
          <span style="color:var(--muted)">${pct}</span>
          <span style="flex:1"></span>
          <span style="color:var(--muted)">Category ${p.cat}:</span>
          ${cs?`<span class="cv">${cs.pct}%</span><span style="color:var(--muted)">(${cs.sum}/${cs.max})</span>`:'<span style="color:var(--muted)">—</span>'}
        </div>
      </div>
    </div>`;
}

function renderFtr(){
  const r=cur;
  document.getElementById('fsums').innerHTML=['B','C','D','E'].map(c=>{
    const cs=catPct(r,c);
    return `<div class="schip"><span class="sl">Cat ${c}:</span><span class="sv">${cs?cs.pct+'%':'—'}</span></div>`;
  }).join('');
  const tot=totalDone();
  document.getElementById('pfill').style.width=(tot/42*100)+'%';
  document.getElementById('plbl').textContent=`${tot}/42`;
  document.getElementById('erlbl').textContent=r;
}

function upd(){renderTabs();renderSB();renderCnt();renderFtr();
  document.getElementById('pbtn').disabled=ORDER.indexOf(topic)===0;
  document.getElementById('nbtn').disabled=ORDER.indexOf(topic)===ORDER.length-1;
}

// Actions
function swR(r){cur=r;upd();}
function selT(t){topic=t;upd();}
function nav(d){const i=ORDER.indexOf(topic)+d;if(i>=0&&i<ORDER.length){topic=ORDER[i];upd();}}
function saveR(r,t,v){if(!RS[r])RS[r]={};RS[r][t]=v;save();}
function saveN(r,t,v){if(!NT[r])NT[r]={};NT[r][t]=v;save();}
function cpPrompt(){
  navigator.clipboard.writeText(P[topic].prompt).then(()=>{
    const b=document.getElementById('cpbtn');
    b.textContent='Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1500);
  });
}

function genMd(run){
  let md=TMPLS[String(run)];
  for(const t of ORDER){
    const p=P[t];
    for(const d of p.dims){
      const v=SC[run]?.[t]?.[d]??null;
      if(v!==null){
        const re=new RegExp(`(## ${p.cat} / ${t}[\\s\\S]*?- ${d}: \`score: )\``, 'm');
        md=md.replace(re, `$1${v}\``);
      }
    }
    const n=NT[run]?.[t];
    if(n){
      const re=new RegExp(`(## ${p.cat} / ${t}[\\s\\S]*?\\*\\*Notes:\\*\\* )`, 'm');
      md=md.replace(re, `$1${n}\n`);
    }
  }
  return md;
}

function expRun(r){
  const md=genMd(r);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));
  a.download=`2026-05-16-local-run${r}-scoring.md`;
  a.click();URL.revokeObjectURL(a.href);
}
function expAll(){[1,2,3].forEach(r=>expRun(r));}

upd();
</script>
</body>
