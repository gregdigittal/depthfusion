<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & glow" subtitle="Warm shadows with amber rim light" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:30px 26px;display:flex;gap:30px;flex-wrap:wrap}
 .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
 .box{width:120px;height:64px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl)}
 .glow{background:var(--accent);border:none}
 .n{font:11px var(--font-mono);color:var(--muted)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="n">--shadow-card</span></div>
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-card-hover)"></div><span class="n">--shadow-card-hover</span></div>
 <div class="cell"><div class="box" style="box-shadow:var(--shadow-pop)"></div><span class="n">--shadow-pop</span></div>
 <div class="cell"><div class="box glow" style="box-shadow:var(--accent-glow)"></div><span class="n">--accent-glow</span></div>
</div></body></html>
