<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing scale" subtitle="4px grid" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:24px 26px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
 .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
 .bar{background:var(--accent);border-radius:2px;width:24px}
 .n{font:11px var(--font-mono);color:var(--muted)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><div class="bar" style="height:4px"></div><span class="n">1·4</span></div>
 <div class="cell"><div class="bar" style="height:8px"></div><span class="n">2·8</span></div>
 <div class="cell"><div class="bar" style="height:12px"></div><span class="n">3·12</span></div>
 <div class="cell"><div class="bar" style="height:16px"></div><span class="n">4·16</span></div>
 <div class="cell"><div class="bar" style="height:20px"></div><span class="n">5·20</span></div>
 <div class="cell"><div class="bar" style="height:24px"></div><span class="n">6·24</span></div>
 <div class="cell"><div class="bar" style="height:32px"></div><span class="n">8·32</span></div>
 <div class="cell"><div class="bar" style="height:40px"></div><span class="n">10·40</span></div>
 <div class="cell"><div class="bar" style="height:48px"></div><span class="n">12·48</span></div>
 <div class="cell"><div class="bar" style="height:64px"></div><span class="n">16·64</span></div>
</div></body></html>
