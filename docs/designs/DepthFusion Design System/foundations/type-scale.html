<!-- @dsCard group="Type" viewport="700x300" name="UI type scale" subtitle="Roles, sizes & weights" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:13px}
 .row{display:flex;align-items:baseline;gap:16px}
 .s{color:var(--text)}
 .meta{margin-left:auto;font:10px var(--font-mono);color:var(--faint);white-space:nowrap}
</style></head>
<body class="df"><div class="wrap">
 <div class="row"><span class="s" style="font-family:var(--font-display);font-weight:300;font-size:30px;letter-spacing:-.03em">Sign-in title</span><span class="meta">--fs-h1 · 30 · Fraunces 300</span></div>
 <div class="row"><span class="s" style="font-size:20px;font-weight:600">Section heading</span><span class="meta">--fs-h2 · 20 · 600</span></div>
 <div class="row"><span class="s" style="font-family:var(--font-display);font-weight:300;font-size:26px">247</span><span class="meta">--fs-stat · 26 · Fraunces</span></div>
 <div class="row"><span class="s" style="font-size:15px;font-weight:600">Brand / result title</span><span class="meta">--fs-title · 15 · 600</span></div>
 <div class="row"><span class="s" style="font-size:13px;color:var(--text-2)">Body & UI default text</span><span class="meta">--fs-body · 13 · 400</span></div>
 <div class="row"><span class="s" style="font-size:12px;color:var(--muted)">Snippet / secondary copy</span><span class="meta">--fs-snippet · 12</span></div>
 <div class="row"><span class="s" style="font:600 11px var(--font-mono);letter-spacing:.18em;text-transform:uppercase;color:var(--muted)">Plate 01 · slate</span><span class="meta">--fs-label · 11 · mono caps</span></div>
</div></body></html>
