<!-- @dsCard group="Spacing" viewport="700x140" name="Radius · sharp" subtitle="Darkroom precision — 2–7px" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:24px 26px;display:flex;gap:20px;flex-wrap:wrap}
 .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
 .box{width:48px;height:48px;background:var(--surface-2);border:1px solid var(--border-strong)}
 .n{font:11px var(--font-mono);color:var(--muted)}
 .sub{font:10px var(--font-mono);color:var(--faintest)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><div class="box" style="border-radius:var(--r-sm)"></div><span class="n">--r-sm 2</span><span class="sub">chips</span></div>
 <div class="cell"><div class="box" style="border-radius:var(--r-md)"></div><span class="n">--r-md 3</span><span class="sub">buttons · inputs</span></div>
 <div class="cell"><div class="box" style="border-radius:var(--r-lg)"></div><span class="n">--r-lg 5</span><span class="sub">cards</span></div>
 <div class="cell"><div class="box" style="border-radius:var(--r-xl)"></div><span class="n">--r-xl 6</span><span class="sub">panels</span></div>
 <div class="cell"><div class="box" style="border-radius:var(--r-window)"></div><span class="n">--r-window 7</span><span class="sub">app window</span></div>
</div></body></html>
