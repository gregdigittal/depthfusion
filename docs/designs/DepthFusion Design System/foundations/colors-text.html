<!-- @dsCard group="Colors" viewport="700x130" name="Text · warm ivory" subtitle="Type color scale on paper" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:22px 24px;display:flex;flex-wrap:wrap;gap:22px;align-items:flex-start}
 .cell{display:flex;flex-direction:column;gap:4px}
 .samp{font:600 22px var(--font-sans)}
 .n{font:500 11px var(--font-mono);color:var(--text-2)}
 .h{font:10px var(--font-mono);color:var(--faint)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><span class="samp" style="color:var(--text)">Aa</span><span class="n">--text</span><span class="h">#efe6d6</span></div>
 <div class="cell"><span class="samp" style="color:var(--text-2)">Aa</span><span class="n">--text-2</span><span class="h">#c7b89a</span></div>
 <div class="cell"><span class="samp" style="color:var(--muted)">Aa</span><span class="n">--muted</span><span class="h">#8a7a5f</span></div>
 <div class="cell"><span class="samp" style="color:var(--faint)">Aa</span><span class="n">--faint</span><span class="h">#6f6047</span></div>
 <div class="cell"><span class="samp" style="color:var(--faintest)">Aa</span><span class="n">--faintest</span><span class="h">#5a4e3e</span></div>
</div></body></html>
