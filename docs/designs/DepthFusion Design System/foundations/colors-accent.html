<!-- @dsCard group="Colors" viewport="700x160" name="Accent · the safelight" subtitle="Amber & ember + glow" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:22px 24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
 .cell{display:flex;align-items:center;gap:10px}
 .sw{width:36px;height:36px;border-radius:5px;border:1px solid rgba(239,230,214,.08);flex-shrink:0}
 .n{font:500 12px var(--font-mono);color:var(--text);display:block}
 .h{font:11px var(--font-mono);color:var(--faint)}
 .glow{box-shadow:var(--accent-glow)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><div class="sw glow" style="background:var(--accent)"></div><div><span class="n">--accent</span><span class="h">#ff8e3a · glow</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--accent-hover)"></div><div><span class="n">--accent-hover</span><span class="h">#ffa45c</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--accent-bright)"></div><div><span class="n">--accent-bright</span><span class="h">#ffb877</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--accent-soft)"></div><div><span class="n">--accent-soft</span><span class="h">#c2701f</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--ember)"></div><div><span class="n">--ember</span><span class="h">#c2410c</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--accent-wash)"></div><div><span class="n">--accent-wash</span><span class="h">amber 14%</span></div></div>
</div></body></html>
