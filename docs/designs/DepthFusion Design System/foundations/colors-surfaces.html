<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Warm near-black 'paper' elevation" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
 html,body{margin:0;background:var(--bg)}
 .grid{padding:22px 24px;display:flex;flex-wrap:wrap;gap:12px}
 .cell{display:flex;align-items:center;gap:10px}
 .sw{width:36px;height:36px;border-radius:5px;border:1px solid rgba(239,230,214,.1);flex-shrink:0}
 .n{font:500 12px var(--font-mono);color:var(--text);display:block}
 .h{font:11px var(--font-mono);color:var(--faint)}
</style></head>
<body class="df"><div class="grid">
 <div class="cell"><div class="sw" style="background:var(--bg)"></div><div><span class="n">--bg</span><span class="h">#09070a</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--surface)"></div><div><span class="n">--surface</span><span class="h">#120e0b</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--surface-2)"></div><div><span class="n">--surface-2</span><span class="h">#1a140f</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--surface-3)"></div><div><span class="n">--surface-3</span><span class="h">#251c14</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--border)"></div><div><span class="n">--border</span><span class="h">#3a2a1e</span></div></div>
 <div class="cell"><div class="sw" style="background:var(--border-strong)"></div><div><span class="n">--border-strong</span><span class="h">#4a3527</span></div></div>
</div></body></html>
