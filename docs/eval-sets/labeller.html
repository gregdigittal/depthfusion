{id:'neg-001',session:'depthfusion-recall-tuning-2026-04',text:`Tried increasing the recall top_k to 100 to improve coverage. The problem: we're using Haiku as the reranker, and with 100 candidates it hits the Haiku API rate limit consistently during busy sessions. Requests start queuing, the MCP server times out, and the whole recall operation fails.\n\nPulled back to top_k=20. That keeps us well under the rate limit. We're trading some recall coverage for reliability.`},
{id:'neg-002',session:'task-queue-architecture-2026-03',text:`Used SQLite as the backing store for the background task queue. Seemed convenient — no infrastructure to set up, file-based, easy to inspect.\n\nProblem: SQLite has file-level locking. Only one writer can hold the lock at a time. With 4 worker processes picking up tasks simultaneously, they're constantly contending for the lock. Task throughput dropped by 60% compared to our previous system, and we're seeing deadlock errors under load.\n\nMigrated to PostgreSQL, which has proper row-level locking. Workers pick up different rows simultaneously without contention.`},
{id:'neg-003',session:'file-upload-progress-2026-03',text:`Implemented server-sent events (SSE) to stream file upload progress to the browser. Worked perfectly locally. Broke completely in staging.\n\nThe issue: our Nginx proxy has a proxy_request_buffering directive that buffers the entire request body before forwarding it to the application. The upload is complete before we even see the first byte. SSE for upload progress is pointless when the proxy is buffering the upload.\n\nAlso, Nginx has a 60-second proxy timeout. Large uploads were being killed mid-transfer.\n\nSwitched to a polling approach: the client sends the file, gets a task ID back, then polls /tasks/{id}/status every second.`},
{id:'neg-004',session:'retry-logic-2026-02',text:`Implemented plain exponential backoff for retrying failed API calls: wait 1 second, then 2, then 4, then 8. This caused a "retry storm" when our payment processor had a 90-second outage. All queued retries synchronized and fired at the same time when the processor came back online, immediately overwhelming it again.\n\nSwitched to exponential backoff with random jitter. Now each retry waits a random amount within the window. Retries spread out and the recovering service gets a gradual traffic ramp instead of a sudden spike.`},
{id:'neg-005',session:'async-celery-integration-2026-03',text:`Tried using aioredis (async Redis client) inside Celery task handlers so we could share async code between our FastAPI app and our Celery workers.\n\nThe problem: Celery runs a synchronous event loop (it predates Python async). When aioredis tries to create an event loop inside a Celery worker, it conflicts with the loop Celery uses internally. Getting "There is no current event loop in thread" errors constantly.\n\nReverted to sync redis-py inside Celery workers. Kept aioredis only in the FastAPI async context where it belongs.`},
{id:'neg-006',session:'pagination-performance-2026-02',text:`Had OFFSET-based pagination on the products table. Page 1 was fast. Page 200 (items 3,981-4,000 in a sorted list of 2 million products) was taking 15 seconds — the database fetches rows 1 through 4,000 and discards the first 3,980 every time.\n\nReplaced with keyset pagination: WHERE id > {last_seen_id} ORDER BY id LIMIT 20. The index lookup is instant regardless of which "page" you're on. Page 1 and page 50,000 are equally fast.`},
{id:'neg-007',session:'caching-architecture-2026-03',text:`Added an in-process LRU cache to the user service — a Python dictionary with a max size. Seemed efficient since it avoids a Redis network roundtrip on every request.\n\nProblem: we run 8 Gunicorn worker processes. Each process has its own in-process cache, so we effectively have 8 separate caches. When a user updates their profile, we invalidate the cache in the worker that handled the update — but the other 7 workers still have stale data.\n\nWe had an incident where a user changed their email address and kept seeing the old email for 20 minutes because 7 of 8 workers were serving stale cached data.\n\nMoved to Redis as the shared cache.`},
{id:'neg-008',session:'grpc-migration-attempt-2026-02',text:`Attempted to migrate inter-service communication from REST to gRPC for the performance benefits (binary protocol, multiplexing, streaming).\n\nSpent a week on the migration. Then discovered our infrastructure uses HAProxy in TCP mode as the load balancer between services. HAProxy in TCP mode doesn't understand HTTP/2, which gRPC requires. It terminates HTTP/2 connections because it expects HTTP/1.1.\n\nReverting the entire migration back to REST/JSON.`},
{id:'neg-009',session:'primary-key-design-2026-01',text:`Switched all primary keys from auto-increment integers to ULIDs (Universally Unique Lexicographically Sortable Identifiers). ULIDs are sortable by time, URL-safe, and don't expose sequence information.\n\nIntegration test with our payment processor revealed the problem: their API requires a numeric-only merchant reference ID. ULIDs contain letters. Sending a ULID as the merchant reference ID caused their API to return a 400 error.\n\nReverted to auto-increment integers. The payment processor integration is too important to work around.`},
{id:'neg-010',session:'search-scaling-2026-03',text:`Hit the limits of PostgreSQL full-text search at production scale. With 10 million products, search queries are consistently taking 800ms to 2 seconds — well above the 200ms target.\n\nPostgreSQL FTS works well at moderate scale but doesn't have the tuning knobs needed for fast faceted search (filtering by category + brand + price range + availability simultaneously) at this data size.\n\nEvaluating Elasticsearch and Typesense as dedicated search solutions. Haven't migrated yet — this is a finding from load testing, not a completed migration.`},
{id:'neg-011',session:'realtime-updates-2026-02',text:`Used WebSockets for real-time order status updates to the dashboard. Worked well in development. In production, connections drop after a few minutes.\n\nRoot cause: our HAProxy load balancer has a 60-second timeout on idle TCP connections. WebSockets look like idle TCP to HAProxy if no data is flowing. After 60 seconds of no new order status changes, HAProxy kills the connection.\n\nSwitched to long-polling (client waits up to 30 seconds for a response, reconnects immediately after each response).`},
{id:'neg-012',session:'distributed-transaction-2026-02',text:`Tried implementing the Saga pattern for distributed transactions across the order, inventory, and payment services. Each service has a compensating transaction (undo action) that gets called if a later step fails.\n\nAfter 3 weeks of implementation, the compensating transaction logic became extremely complex. We built compensation chains for compensating transactions.\n\nFor our current scale (500 orders/day), this is massive over-engineering. Replaced with a sequential flow with retry logic: step 1 → step 2 → step 3, with idempotent retries on failure. Much simpler and handles 99% of failure scenarios.`},
{id:'neg-013',session:'cqrs-evaluation-2026-03',text:`Evaluated CQRS (Command Query Responsibility Segregation) for handling the read/write performance mismatch in the reporting service. The idea: maintain a separate read model optimized for queries, updated asynchronously from the write model via events.\n\nAfter a week of design work, concluded it's premature optimization. Our write throughput is 500 orders/day and peak read load is 200 concurrent dashboard users. Adding CQRS means maintaining two data models, an event bus, and eventual consistency semantics.\n\nThe current PostgreSQL setup with proper indexes handles our actual load fine. Shelving CQRS for if/when we're 10x bigger.`},
{id:'neg-014',session:'auth-performance-2026-02',text:`Added a Bloom filter to the authentication middleware for fast "is this token revoked?" checks. Bloom filters give probabilistic membership tests in O(1) with very small memory footprint.\n\nThe problem: Bloom filters have false positives. Our configuration had a 1% false positive rate. This meant 1% of valid login requests were being rejected as "revoked" — legitimate users getting "invalid session" errors on 1 in 100 requests.\n\nRemoved the Bloom filter from the auth flow. Reverted to a direct Redis lookup (still fast). The false positive rate is unacceptable in an auth context — any false positive is a user incorrectly locked out.`},
{id:'neg-015',session:'analytics-db-evaluation-2026-03',text:`Evaluated ClickHouse as the database for our analytics service. ClickHouse is a column-oriented database purpose-built for analytical queries — aggregations over large datasets are extremely fast.\n\nProblem: our analytics data also has OLTP requirements. When an order is placed, we need to update several analytics tables atomically. ClickHouse is optimized for append-only workloads and doesn't support traditional ACID transactions or foreign key relationships.\n\nKeeping PostgreSQL for the analytics tables. ClickHouse would be appropriate if we needed sub-second queries across billions of rows.`},
{id:'neg-016',session:'auth-revocation-2026-03',text:`The original authentication design used JWTs with no server-side state — completely stateless. This seemed like an architectural win.\n\nProblem: if a user's account is compromised, we can't revoke their token. The token stays valid until it naturally expires (we had 24-hour expiry at the time). An attacker with a stolen token has 24 hours of access even after the user reports the compromise and resets their password.\n\nChanged to: short-lived access tokens (15 minutes) + Redis-backed revocation list. On password reset or explicit logout, add the user's token family to the revocation list.`},
{id:'neg-017',session:'sqlalchemy-async-migration-2026-03',text:`Proposed migrating from sync SQLAlchemy to async SQLAlchemy (SQLAlchemy 2.0+ async extension) to fit our async FastAPI codebase.\n\nAfter 2 weeks of partial migration work: the async SQLAlchemy API is significantly different from the sync API. Every query pattern needs to be rewritten. Lazy loading doesn't work in async context. We hit three bugs in edge cases.\n\nEstimated completion: 3 more weeks plus significant regression testing. Risk of introducing subtle data integrity bugs is high. Decided to stay with sync SQLAlchemy called via thread pool executor.`},
{id:'neg-018',session:'jwt-payload-design-2026-02',text:`Stored all user permissions and role memberships in the JWT payload so the API gateway could validate authorization without hitting a backend service. An enterprise user with many roles had a JWT payload that expanded to 6-8KB.\n\nThis caused two problems: the 4KB limit on cookie storage (browsers refuse to set the cookie), and the 8KB HTTP header limit (nginx was returning 400 errors).\n\nSwitched to minimal JWT claims (user_id, issued_at, expiry). Permissions are cached in Redis with a 5-minute TTL, keyed by user_id.`},
{id:'neg-019',session:'python-upgrade-attempt-2026-03',text:`Attempted to upgrade from Python 3.10 to 3.12 to get the performance improvements and new language features.\n\nBlocker: one of our core dependencies uses greenlet, a C extension for coroutine switching. The greenlet build for Python 3.12 had a C API incompatibility with the version of gevent our code depends on. The gevent team was aware but hadn't released a fix yet.\n\nReverting to Python 3.10. Will re-evaluate in 3-6 months when the ecosystem catches up.`},
{id:'neg-020',session:'scheduled-maintenance-2026-02',text:`Tried using pg_cron (PostgreSQL cron extension) to schedule database cleanup tasks — delete expired sessions, archive old logs, vacuum large tables.\n\nProblem: pg_cron uses PostgreSQL advisory locks to prevent duplicate runs. Our application has transaction patterns that hold advisory locks for extended periods. pg_cron jobs were consistently failing because the advisory locks were already held, causing maintenance to be skipped entirely for days at a time.\n\nMoved scheduled maintenance to a separate Python service that runs as a Kubernetes CronJob.`},
{id:'neg-021',session:'multi-region-architecture-2026-03',text:`Evaluated multi-region active-active write deployment — having multiple geographic regions each accept writes independently for lower latency.\n\nThe core problem: we have global invariants that can't be violated. Account balances can't go negative. Inventory quantities can't go below zero. With active-active writes, two users in different regions can both try to use the last item in stock simultaneously.\n\nThese invariants require coordination between regions for writes, which eliminates the latency advantage. Staying with active-passive (one write region, read replicas in other regions).`},
{id:'neg-022',session:'orm-evaluation-2026-02',text:`The codebase uses a custom ORM that was built in-house 3 years ago. At the time, it made sense.\n\nProblems now: it's become a maintenance burden. Bugs take 2-3x longer to fix than they would in a standard ORM. New team members spend a week learning its quirks before they can be productive. It's missing features (no connection pooling, no async support) that we now need.\n\nMigrating to SQLAlchemy over the next two releases. The migration is scoped and phased, with the custom ORM running in parallel during transition.`},
{id:'neg-023',session:'redis-as-primary-store-2026-01',text:`Evaluated using Redis as the primary data store for the session management service instead of PostgreSQL. Redis is much faster for the simple key-value lookups that session management requires.\n\nCritical risk: Redis by default stores data in memory with asynchronous persistence. If the server crashes before a write is persisted to disk, that data is lost. With default configuration, you can lose up to the last second of writes.\n\nFor session data this might be acceptable, but we also store important session-adjacent data (rate limit counters, CSRF tokens) in the same store. Keeping PostgreSQL as the primary store. Redis remains a cache layer.`},
{id:'neg-024',session:'mongodb-odm-evaluation-2026-03',text:`Started using Mongoose as the ODM (Object Document Mapper) for our MongoDB-backed product catalog service. Mongoose adds schema validation and a familiar ActiveRecord-style API.\n\nProblem: our reporting queries are relational — "give me all products in category X that have had at least 3 orders in the last 30 days, grouped by supplier." In MongoDB + Mongoose, this requires complex $lookup aggregation pipelines.\n\nConsidering moving to the native MongoDB Node.js driver directly, which at least makes the aggregation pipeline code more legible without the ODM abstraction pretending the data is not a document store.`},
{id:'neg-025',session:'push-notification-architecture-2026-02',text:`Investigated using WebRTC data channels for push notifications. WebRTC can punch through NAT and firewalls better than WebSockets, which was attractive given that some corporate users are behind strict firewalls.\n\nThe operational complexity was prohibitive: WebRTC requires STUN and TURN servers for NAT traversal. Setting up and maintaining TURN infrastructure is significant.\n\nAbout 30% of our corporate users are behind firewalls that block WebRTC. SSE (Server-Sent Events) works through those firewalls because it's just long-lived HTTP. Switched to SSE for push notifications.`},
{id:'neg-026',session:'subscription-plan-perf-2026-03',text:`The /billing/subscriptions endpoint was returning in 8-10 seconds for enterprise accounts. Profiled the query: joining users → subscriptions → subscription_plans was doing a sequential scan on subscription_plans (50,000 rows).\n\nThe plans table had no index on plan_id — it was treated as a small lookup table when the service was first built, but it has grown to 50k rows with complex plan hierarchies.\n\nAdded a B-tree index on subscription_plans(plan_id). Query time: 8 seconds → 20 milliseconds. No code changes needed.`},
{id:'neg-027',session:'inventory-race-condition-2026-02',text:`Users were able to over-order limited inventory items. Two users would simultaneously check "is item X available?" (yes, 1 left), both proceed to checkout, both successfully place orders, now we have -1 inventory.\n\nClassic read-modify-write race condition. The fix: use SELECT FOR UPDATE when reading inventory during checkout. This places a row-level lock — the second user's SELECT waits until the first transaction commits or rolls back.\n\nThis is now the pattern for all inventory reservation operations.`},
{id:'neg-028',session:'user-registration-500-2026-02',text:`Users were getting 500 errors when registering with a phone number that does not include a country code. The phone validation middleware was calling phone.strip('+') before checking if it is null, throwing a NullPointerException on null inputs.\n\nFixed: moved the null check before any method calls. Added test cases for null, empty string, and various phone formats.`},
{id:'neg-029',session:'csv-import-flaky-test-2026-03',text:`The test_import_products_csv integration test was failing intermittently — about 1 in 10 runs on CI. The test imports 500 rows, then asserts the database contains 500 products.\n\nRoot cause: the test was running the import (async) and immediately asserting without waiting for all async workers to finish. On slow CI machines, some rows had not been committed when the assertion ran.\n\nFixed: added a polling assertion that waits up to 5 seconds for the count to reach 500, checking every 100ms. Flakiness eliminated across 50 subsequent CI runs.`},
{id:'neg-030',session:'api-v1-deprecation-2026-02',text:`Completed the v1 to v2 API migration. We announced v1 deprecation 3 months ago, gave all API consumers a 3-month migration window, sent reminder emails at 90/60/30/7 days. Traffic to v1 endpoints dropped from 100% to under 2% over the window.\n\nTurned off v1 endpoints yesterday. The remaining 2% of traffic was from abandoned integrations. No support tickets after the cutover.\n\nThe migration is complete.`},
{id:'neg-031',session:'timezone-double-conversion-2026-03',text:`Bug: users in non-UTC timezones were seeing event times that were wrong by their UTC offset — twice. Traced it: the server was converting UTC timestamps to local time before sending them in the API response, and the frontend was also converting assuming the server sent UTC.\n\nFix: server now sends UTC timestamps only. Frontend always treats received timestamps as UTC before converting to local time for display. The double-conversion is eliminated.`},
{id:'neg-032',session:'websocket-memory-leak-2026-02',text:`Memory usage in the WebSocket service was growing unboundedly. Connections were being properly closed from the client side, but memory was not being reclaimed.\n\nFound: event listeners were being attached to connections but only cleaned up in the 'close' event handler. Connections that ended with an error ('error' event) before reaching 'close' were not cleaning up their listeners — references were kept alive.\n\nFixed: cleanup function now runs on both 'error' and 'close' events. Memory usage stabilized in monitoring after deploy.`},
{id:'neg-033',session:'project-list-n-plus-one-2026-02',text:`The GET /api/projects endpoint was taking 1.2 seconds for users with many projects. Database profiling showed 1 query to load the project list + 1 additional query per project to load the owner information — 51 queries for a page of 50 projects.\n\nFixed: changed the query to JOIN users ON users.id = projects.owner_id in the initial query, loading the owner data in one roundtrip. Response time: 1.2s to 85ms.`},
{id:'neg-034',session:'migration-0043-fix-2026-03',text:`Migration 0043 (adding a not-null status column to orders) was broken. It tried to add the column and set a default value in one transaction, but existing rows were still null after the migration because the UPDATE statement was missing a WHERE clause.\n\nFixed the migration: added a correct WHERE clause (WHERE status IS NULL). Wrote a separate data repair migration to fix the rows affected by the broken run in staging.`},
{id:'neg-035',session:'compose-service-name-fix-2026-02',text:`The app service was failing to start in Docker Compose with "could not connect to database" errors. The DATABASE_URL environment variable was referencing "postgres" as the hostname, but the service in docker-compose.yml was named "db".\n\nDocker Compose uses service names as hostnames. Fixed the DATABASE_URL to reference "db" instead of "postgres". Service started correctly.`},
{id:'neg-036',session:'websocket-tls-fix-2026-03',text:`WebSocket connections were failing in production with "WebSocket is closed before the connection is established." Development worked fine.\n\nRoot cause: the frontend was connecting to ws:// (unencrypted) but production is served over HTTPS. Browsers block mixed content — an HTTPS page cannot open an unencrypted ws:// connection.\n\nFixed: changed ws:// to wss:// (WebSocket Secure) in the production frontend config.`},
{id:'neg-037',session:'react-query-v5-upgrade-2026-02',text:`Upgraded from react-query v4 to v5. The API changed significantly — useQuery and useMutation hook signatures changed, QueryClient instantiation changed, and several types were renamed or restructured.\n\nWent through all 40+ hook usages in the codebase and updated the type signatures and hook options to match v5 API. TypeScript was helpful here — every error was a compile-time type error pointing to the exact change needed. All type errors resolved.`},
{id:'neg-038',session:'npm-peer-dependency-2026-01',text:`Running npm install was failing with "ERESOLVE unable to resolve dependency tree" because two packages both required react as a peer dependency but specified different version ranges that did not overlap.\n\nFixed by adding a resolutions field to package.json pinning the shared react version to the range that satisfies both packages. npm install now completes cleanly.`},
{id:'neg-039',session:'users-email-index-2026-02',text:`Users were reporting slow login times (3+ seconds). Database profiling showed the login query (SELECT id, password_hash FROM users WHERE email = ?) was doing a sequential scan on 2 million user rows.\n\nAdded a unique B-tree index on users(email). Login query time: 3 seconds to under 10 milliseconds.`},
{id:'neg-040',session:'env-var-typo-fix-2026-01',text:`The user service was failing to connect to the database in the development environment. Error: "connection refused" on startup.\n\nFound a typo in the .env file: the variable was named DATABASE_URL in the config file but DATABASE_URI in the application code that reads it. The application was reading undefined, falling back to a default localhost URL that did not exist in the dev setup.\n\nFixed the variable name in .env to match what the application reads.`},
];

// ─── STATE ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'depthfusion-labeller-v1';
let state = {tab:'de',de:{idx:0,labels:{}},dd:{idx:0,labels:{}},neg:{idx:0,labels:{}}};

function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)state=JSON.parse(s);}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}

function countDone(tab){let n=0;for(const id in state[tab].labels){if(state[tab].labels[id].saved)n++;}return n;}

function updateTabCounts(){
  document.getElementById('de-count').textContent=countDone('de');
  document.getElementById('dd-count').textContent=countDone('dd');
  document.getElementById('neg-count').textContent=countDone('neg');
}

function currentData(){return state.tab==='de'?DE_DATA:state.tab==='dd'?DD_DATA:NEG_DATA;}
function currentIdx(){return state[state.tab].idx;}
function currentItem(){return currentData()[currentIdx()];}
function currentLabels(){return state[state.tab].labels;}

function getOrInitLabel(tab,id){
  if(!state[tab].labels[id]){
    if(tab==='de') state[tab].labels[id]={saved:false,skipped:false,no_decisions:false,decisions:[],notes:''};
    else if(tab==='dd') state[tab].labels[id]={saved:false,skipped:false,label:null,notes:''};
    else state[tab].labels[id]={saved:false,skipped:false,type:null,negatives:[],notes:''};
  }
  return state[tab].labels[id];
}

// ─── GUIDE (static text built with DOM) ───────────────────────────────────────

function renderGuide(){
  const g=document.getElementById('guide');
  while(g.firstChild)g.removeChild(g.firstChild);
  const h=document.createElement('h3');
  const ps=[];
  if(state.tab==='de'){
    h.textContent='What counts as a decision?';
    const p1=document.createElement('p');
    p1.textContent='A decision is a deliberate choice that helps future developers understand WHY the code looks the way it does.';
    const p2=document.createElement('p');
    const y=document.createElement('span');y.className='yes';y.textContent='✓ COUNT these: ';
    p2.append(y);p2.append(document.createTextNode('Choosing a technology (Redis over Memcached), setting a team policy ("all timestamps must be UTC"), picking an architecture pattern, deciding to refactor something and why.'));
    const p3=document.createElement('p');
    const n=document.createElement('span');n.className='no';n.textContent='✗ DON\'T COUNT these: ';
    p3.append(n);p3.append(document.createTextNode('Pure implementation work ("added the function"), bug fixes ("fixed the null pointer"), temporary workarounds, or speculation ("we might consider…").'));
    const p4=document.createElement('p');
    p4.textContent='If reading this text, you\'d think "I need to know this before changing the code" — it\'s probably a decision.';
    ps.push(p1,p2,p3,p4);
  } else if(state.tab==='dd'){
    h.textContent='Are these the same fact?';
    const p1=document.createElement('p');
    p1.textContent='Ask yourself: if you already knew one, would the other tell you anything new?';
    const p2=document.createElement('p');
    const y=document.createElement('span');y.className='yes';y.textContent='TRUE DUPLICATE ';
    p2.append(y);p2.append(document.createTextNode('= same core fact, just phrased differently. Keeping both clutters memory with redundant information.'));
    const p3=document.createElement('p');
    const n=document.createElement('span');n.className='no';n.textContent='NOT A DUPLICATE ';
    p3.append(n);p3.append(document.createTextNode('= same general topic, but different detail, different scope, or complementary perspective. Both are worth keeping.'));
    const p4=document.createElement('p');
    const b=document.createElement('strong');b.textContent='Tricky case: ';
    p4.append(b);p4.append(document.createTextNode('"tokens expire after 15 minutes" and "tokens use RS256 signing" are both about JWTs but cover different aspects — NOT duplicates.'));
    ps.push(p1,p2,p3,p4);
  } else {
    h.textContent='Was something tried and rejected?';
    const p1=document.createElement('p');
    p1.textContent='Genuine negatives capture valuable institutional knowledge: "we tried X and it broke Y, so we use Z instead."';
    const p2=document.createElement('p');
    const y=document.createElement('span');y.className='yes';y.textContent='YES — genuine negative: ';
    p2.append(y);p2.append(document.createTextNode('Something was explicitly tried, explicitly abandoned, AND the reason is stated. The rejection is the key part.'));
    const p3=document.createElement('p');
    const n=document.createElement('span');n.className='no';n.textContent='NO — not a negative: ';
    p3.append(n);p3.append(document.createTextNode('A bug was fixed and resolved. A temporary struggle was overcome. A limitation was noted without abandoning anything. A successful migration was completed.'));
    const p4=document.createElement('p');
    const b=document.createElement('strong');b.textContent='Key test: ';
    p4.append(b);p4.append(document.createTextNode('Is the system currently NOT using this approach because of the experience described?'));
    ps.push(p1,p2,p3,p4);
  }
  g.append(h,...ps);
}

// ─── DOTS ─────────────────────────────────────────────────────────────────────

function renderDots(){
  const data=currentData();const labels=currentLabels();const idx=currentIdx();
  const grid=document.getElementById('dot-grid');
  while(grid.firstChild)grid.removeChild(grid.firstChild);
  data.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='dot';
    const lab=labels[item.id];
    let cls='';
    if(lab&&lab.saved)cls='done';
    else if(lab&&lab.skipped)cls='skipped';
    if(i===idx)cls=cls?cls+'-current':'current';
    if(cls)d.className='dot '+cls;
    d.title=`${item.id} (${i+1}/${data.length})`;
    d.onclick=()=>{state[state.tab].idx=i;render();};
    grid.appendChild(d);
  });
}

// ─── FORM BUILDERS (DOM only) ─────────────────────────────────────────────────

function clearAndAppend(el,child){while(el.firstChild)el.removeChild(el.firstChild);el.appendChild(child);}

function buildDE(item){
  const lab=getOrInitLabel('de',item.id);
  const form=document.createElement('div');form.id='de-form';

  // No-decisions row
  const noRow=document.createElement('div');noRow.className='no-decision-row';
  const cb=document.createElement('input');cb.type='checkbox';cb.id='no-dec-cb';cb.checked=lab.no_decisions;
  cb.onchange=toggleNoDecisions;
  const lbl=document.createElement('label');lbl.htmlFor='no-dec-cb';
  lbl.textContent='No decisions in this text — it\'s pure implementation, a bug fix, or a workaround';
  noRow.append(cb,lbl);form.appendChild(noRow);

  // Decision list
  const decList=document.createElement('div');decList.id='decision-list';
  lab.decisions.forEach((dec,i)=>decList.appendChild(buildDecRow(dec,i)));
  form.appendChild(decList);

  if(!lab.no_decisions){
    const addBtn=document.createElement('button');addBtn.id='add-decision-btn';
    addBtn.textContent='+ Add decision';addBtn.onclick=addDecision;
    form.appendChild(addBtn);
  }
  return form;
}

function buildDecRow(dec,i){
  const row=document.createElement('div');row.className='decision-row';
  const num=document.createElement('span');num.className='dec-num';num.textContent='#'+(i+1);
  const txt=document.createElement('input');txt.type='text';txt.className='dec-text';
  txt.placeholder='Summarise the decision in a few words...';txt.value=dec.text;
  txt.oninput=e=>{
    const item=currentItem();const lab=getOrInitLabel('de',item.id);
    lab.decisions[i].text=e.target.value;saveState();
  };
  const sel=document.createElement('select');sel.className='dec-cat';
  ['architecture','stack-choice','policy','refactor','other'].forEach(v=>{
    const opt=document.createElement('option');opt.value=v;opt.textContent=
      v==='architecture'?'Architecture':v==='stack-choice'?'Stack choice':v==='policy'?'Policy / rule':v==='refactor'?'Refactor direction':'Other';
    if(dec.category===v)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=e=>{
    const item=currentItem();const lab=getOrInitLabel('de',item.id);
    lab.decisions[i].category=e.target.value;saveState();
  };
  const rmBtn=document.createElement('button');rmBtn.className='remove-btn';rmBtn.textContent='✕';
  rmBtn.onclick=()=>removeDecision(i);
  row.append(num,txt,sel,rmBtn);return row;
}

function buildDD(item){
  const lab=getOrInitLabel('dd',item.id);
  const form=document.createElement('div');form.id='dd-form';

  const panels=document.createElement('div');panels.className='pair-panels';
  const pa=document.createElement('div');pa.className='pair-panel';
  const la=document.createElement('div');la.className='pair-panel-label';la.textContent='Text A';
  const ta=document.createElement('div');ta.textContent=item.a.txt;
  pa.append(la,ta);
  const pb=document.createElement('div');pb.className='pair-panel';
  const lb=document.createElement('div');lb.className='pair-panel-label';lb.textContent='Text B';
  const tb=document.createElement('div');tb.textContent=item.b.txt;
  pb.append(lb,tb);
  panels.append(pa,pb);form.appendChild(panels);

  const btns=document.createElement('div');btns.className='dd-buttons';
  const dupBtn=document.createElement('button');
  dupBtn.className='dd-btn dd-btn-dup'+(lab.label==='true-dup'?' selected':'');
  dupBtn.textContent='✓ TRUE DUPLICATE — same fact, different words';
  dupBtn.onclick=()=>setDDLabel('true-dup');
  const notBtn=document.createElement('button');
  notBtn.className='dd-btn dd-btn-notdup'+(lab.label==='false-dup'?' selected':'');
  notBtn.textContent='✗ NOT A DUPLICATE — different detail or perspective';
  notBtn.onclick=()=>setDDLabel('false-dup');
  btns.append(dupBtn,notBtn);form.appendChild(btns);
  return form;
}

function buildNEG(item){
  const lab=getOrInitLabel('neg',item.id);
  const form=document.createElement('div');form.id='neg-form';

  const btns=document.createElement('div');btns.className='neg-buttons';
  const yBtn=document.createElement('button');
  yBtn.className='neg-btn neg-btn-yes'+(lab.type==='negative'?' selected':'');
  yBtn.textContent='YES — something was tried and rejected';
  yBtn.onclick=()=>setNEGType('negative');
  const nBtn=document.createElement('button');
  nBtn.className='neg-btn neg-btn-no'+(lab.type==='positive'?' selected':'');
  nBtn.textContent='NO — this is a resolved problem or completed work';
  nBtn.onclick=()=>setNEGType('positive');
  btns.append(yBtn,nBtn);form.appendChild(btns);

  if(lab.type==='negative'){
    const hint=document.createElement('div');hint.className='neg-hint';
    hint.textContent='What was rejected and why? (add one entry per distinct rejection reason)';
    form.appendChild(hint);

    const negList=document.createElement('div');negList.id='neg-list';
    lab.negatives.forEach((neg,i)=>negList.appendChild(buildNegRow(neg,i)));
    form.appendChild(negList);

    const addBtn=document.createElement('button');addBtn.id='add-neg-btn';
    addBtn.textContent='+ Add rejection reason';addBtn.onclick=addNeg;
    form.appendChild(addBtn);
  }
  return form;
}

function buildNegRow(neg,i){
  const row=document.createElement('div');row.className='neg-row';
  const hdr=document.createElement('div');hdr.className='neg-row-header';
  const num=document.createElement('span');num.className='neg-row-num';num.textContent='Rejection #'+(i+1);
  const rm=document.createElement('button');rm.className='remove-btn';rm.textContent='✕';rm.onclick=()=>removeNeg(i);
  hdr.append(num,rm);row.appendChild(hdr);
  const fields=document.createElement('div');fields.className='neg-row-fields';
  const f1=document.createElement('div');f1.className='neg-field';
  const l1=document.createElement('label');l1.textContent='What was tried / rejected';
  const i1=document.createElement('input');i1.type='text';i1.placeholder='e.g. gRPC for inter-service comms';i1.value=neg.what;
  i1.oninput=e=>{const item=currentItem();getOrInitLabel('neg',item.id).negatives[i].what=e.target.value;saveState();};
  f1.append(l1,i1);
  const f2=document.createElement('div');f2.className='neg-field';
  const l2=document.createElement('label');l2.textContent='Why it was rejected';
  const i2=document.createElement('input');i2.type='text';i2.placeholder='e.g. HAProxy does not support HTTP/2';i2.value=neg.why;
  i2.oninput=e=>{const item=currentItem();getOrInitLabel('neg',item.id).negatives[i].why=e.target.value;saveState();};
  f2.append(l2,i2);
  fields.append(f1,f2);row.appendChild(fields);
  return row;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render(){
  const item=currentItem();const data=currentData();const idx=currentIdx();
  document.getElementById('item-id').textContent=item.id;
  document.getElementById('item-count').textContent=(idx+1)+' / '+data.length;

  const sessionLabel=document.getElementById('session-label');
  const sessionBox=document.getElementById('session-box');
  if(state.tab==='dd'){
    sessionLabel.style.display='none';sessionBox.style.display='none';
  } else {
    sessionLabel.style.display='block';sessionBox.style.display='block';
    sessionBox.textContent=item.text;
  }

  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  if(state.tab==='de')fa.appendChild(buildDE(item));
  else if(state.tab==='dd')fa.appendChild(buildDD(item));
  else fa.appendChild(buildNEG(item));

  const lab=currentLabels()[item.id];
  document.getElementById('notes-area').value=lab?lab.notes||'':'';
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===data.length-1;

  renderDots();renderGuide();updateTabCounts();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  saveState();render();
}

function navigate(dir){
  const n=currentIdx()+dir;
  if(n<0||n>=currentData().length)return;
  state[state.tab].idx=n;saveState();render();
}

function skipItem(){
  const item=currentItem();const lab=getOrInitLabel(state.tab,item.id);
  lab.skipped=true;lab.notes=document.getElementById('notes-area').value;
  saveState();
  if(currentIdx()<currentData().length-1)state[state.tab].idx++;
  render();
}

function showSaved(){
  const el=document.getElementById('save-status');el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',1500);
}

function saveItem(){
  const item=currentItem();const lab=getOrInitLabel(state.tab,item.id);
  lab.notes=document.getElementById('notes-area').value;
  if(state.tab==='de'){
    if(!lab.no_decisions&&lab.decisions.length===0){alert('Add at least one decision, or check "No decisions in this text".');return;}
    lab.saved=true;
  } else if(state.tab==='dd'){
    if(!lab.label){alert('Select TRUE DUPLICATE or NOT A DUPLICATE before saving.');return;}
    lab.saved=true;
  } else {
    if(!lab.type){alert('Select YES or NO before saving.');return;}
    if(lab.type==='negative'&&lab.negatives.length===0){alert('Add at least one rejection reason when marking as a genuine negative.');return;}
    lab.saved=true;
  }
  saveState();showSaved();updateTabCounts();renderDots();
  if(currentIdx()<currentData().length-1){state[state.tab].idx++;saveState();render();}
}

function toggleNoDecisions(){
  const item=currentItem();const lab=getOrInitLabel('de',item.id);
  lab.no_decisions=document.getElementById('no-dec-cb').checked;
  if(lab.no_decisions)lab.decisions=[];
  saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildDE(item));
}

function addDecision(){
  const item=currentItem();const lab=getOrInitLabel('de',item.id);
  lab.decisions.push({text:'',category:'architecture'});
  saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildDE(item));
}

function removeDecision(i){
  const item=currentItem();const lab=getOrInitLabel('de',item.id);
  lab.decisions.splice(i,1);saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildDE(item));
}

function setDDLabel(val){
  const item=currentItem();const lab=getOrInitLabel('dd',item.id);
  lab.label=val;saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildDD(item));
}

function setNEGType(val){
  const item=currentItem();const lab=getOrInitLabel('neg',item.id);
  lab.type=val;if(val==='positive')lab.negatives=[];saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildNEG(item));
}

function addNeg(){
  const item=currentItem();const lab=getOrInitLabel('neg',item.id);
  lab.negatives.push({what:'',why:''});saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildNEG(item));
}

function removeNeg(i){
  const item=currentItem();const lab=getOrInitLabel('neg',item.id);
  lab.negatives.splice(i,1);saveState();
  const fa=document.getElementById('form-area');
  while(fa.firstChild)fa.removeChild(fa.firstChild);
  fa.appendChild(buildNEG(item));
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────

function exportAll(){
  const now=new Date().toISOString();
  const deOut=[];
  for(const item of DE_DATA){
    const lab=state.de.labels[item.id];if(!lab||!lab.saved)continue;
    deOut.push({schema:'decision-extraction/v1',source_session:item.session,input_text:item.text,
      expected:lab.no_decisions?[]:lab.decisions.map(d=>({text:d.text,category:d.category})),
      reviewer_notes:lab.notes||'',labelled_by:'human',labelled_at:now});
  }
  download('de-gold.json',JSON.stringify(deOut,null,2));

  const ddOut=[];
  for(const item of DD_DATA){
    const lab=state.dd.labels[item.id];if(!lab||!lab.saved)continue;
    ddOut.push({schema:'dedup/v1',label:lab.label,
      a:{chunk_id:item.a.cid,text:item.a.txt},b:{chunk_id:item.b.cid,text:item.b.txt},
      reviewer_notes:lab.notes||'',labelled_by:'human',labelled_at:now});
  }
  download('dd-gold.json',JSON.stringify(ddOut,null,2));

  const negOut=[];
  for(const item of NEG_DATA){
    const lab=state.neg.labels[item.id];if(!lab||!lab.saved)continue;
    negOut.push({schema:'negative/v1',source_session:item.session,input_text:item.text,
      expected_type:lab.type,
      expected_negatives:lab.type==='negative'?lab.negatives.map(n=>({what:n.what,why:n.why})):[],
      reviewer_notes:lab.notes||'',labelled_by:'human',labelled_at:now});
  }
  download('neg-gold.json',JSON.stringify(negOut,null,2));
}

function download(filename,content){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(content);
  a.download=filename;a.click();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();render();
</script>
