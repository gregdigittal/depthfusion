[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "depthfusion"
version = "0.3.0"
description = "Depth-aware memory fusion for Claude Code — weighted retrieval, session attention, context routing, recursive LLMs"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "pyyaml>=6.0",
    "structlog>=24.0",
]

[project.optional-dependencies]
# ── v0.5 three-mode extras (S-42 AC-5) ───────────────────────────────
# `local` mode: BM25-only, no extra dependencies beyond the core.
local = []

# `vps-cpu` mode: Haiku reranker + optional ChromaDB for Tier 2. The
# anthropic SDK is optional — when absent, the Haiku backend reports
# unhealthy and the factory falls back to NullBackend. ChromaDB is
# pulled in so the Tier 2 vector-store path works end-to-end.
vps-cpu = ["chromadb>=0.4"]

# `vps-gpu` mode: on-box Gemma (no Python dep — served via vLLM CLI)
# plus sentence-transformers for local embeddings. ChromaDB still
# included so the Tier 2 path stays available alongside the local
# vector backend.
vps-gpu = [
    "sentence-transformers>=2.2",
    "chromadb>=0.4",
]

# ── Legacy aliases (v0.4.x compatibility; removed in v0.6) ──────────
rlm = ["rlms"]
vps-tier1 = []  # anthropic SDK is already available in the environment
vps-tier2 = ["chromadb>=0.4"]

dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "mypy>=1.0",
    "ruff>=0.4",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501"]   # test assertions and names are often verbose
